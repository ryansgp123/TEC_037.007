<script>
    let hpBoss = 300;
    let hpHeroi = 100;
    let manaHeroi = 100;
    let manaGastaTotal = 0;
    let acao;

    alert("O Chefe Surgiu: 300hp")
    for (let turno = 1; turno <= 15; turno++) {
        if (hpBoss <= 0) {
            alert("O Boss foi Derrotado!")
            break;
        }
        // retorna 0, 1 ou 2. Soma para trazer 1, 2 ou 3
        //acao = Math.floor(Math.random() * 3) + 1
        let menu = "Escolha sua ação: \n"
                    + " 1 - Ataque Básico \n"
                    + " 2 - Skill \n"
                    + " 3 - Ultimate \n";
        let escolha = prompt(menu);
        let acao = parseInt(escolha);

        alert("Ação: " + acao)
        switch(acao) {
            case 1:
                alert("Ataque Básico. 20 dano");
                // hpBoss = hpBoss - 20;
                hpBoss -= 20;
                break;
            case 2:
                if (manaHeroi >= 30) {
                    alert("Skill. 50 dano");
                    hpBoss -= 50;
                    manaHeroi -= 30;
                    manaGastaTotal += 30;
                } else {
                    alert("Mana insuficiente!");
                }
                break;
            case 3:
                if (manaGastaTotal >= 50) {
                    alert("Ultimate. 150 dano");
                    hpBoss -= 150;
                    manaGastaTotal = 0;
                } else {
                    alert("Ultimate não carregada!");
                }
                break;
        }
        alert("HP Boss: " + hpBoss + " Mana:" + manaHeroi);
    }
    if (hpBoss <= 0) {
        alert("Vitória");
    } else {
        alert("Missão Falhou! O Boss continua vivo.");
    }
</script>
